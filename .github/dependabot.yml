version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"
      npm-versions:
        applies-to: version-updates
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: "/docker"
    schedule:
      interval: weekly
    groups:
      docker:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"
