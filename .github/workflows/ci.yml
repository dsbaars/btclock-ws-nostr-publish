name: CI

on:
  push:
    branches: [main]
  pull_request:

# Only keep the latest run per ref alive — a rapid series of pushes
# cancels the older in-flight runs instead of queueing a separate CI
# run for every commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install native build dependencies for zeromq
        run: sudo apt-get update && sudo apt-get install -y build-essential libzmq3-dev cmake

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build
